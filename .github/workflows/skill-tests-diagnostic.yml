name: Skill Tests Diagnostic

on:
  push:
    branches:
      - agent/issue-4-alexa-skill
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-skill:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore Skill tests
        run: dotnet restore tests/AlexaCloudAudio.Skill.Tests/AlexaCloudAudio.Skill.Tests.csproj
      - name: Run Skill tests
        run: dotnet test tests/AlexaCloudAudio.Skill.Tests/AlexaCloudAudio.Skill.Tests.csproj -c Release --no-restore --logger "console;verbosity=detailed"
